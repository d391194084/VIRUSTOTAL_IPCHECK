name: 🤖 全自動資安分析與 Drive 歸檔

on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: '👉 請輸入要掃描的 IP 地址'
        required: true
        type: string

jobs:
  analyze_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 安裝所需套件
        run: |
          pip install google-genai python-docx google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: 🚀 執行全自動分析與上傳
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          THREATFOX_API_KEY: ${{ secrets.THREATFOX_API_KEY }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
          
        run: |
          python auto_analyst.py ${{ github.event.inputs.target_ip }}
